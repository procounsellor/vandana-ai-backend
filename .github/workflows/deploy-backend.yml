name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE: vandana-ai-backend
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vandana-ai-repo/${{ env.SERVICE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vandana-ai-repo/${{ env.SERVICE }}:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vandana-ai-repo/${{ env.SERVICE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vandana-ai-repo/${{ env.SERVICE }}:latest

      - name: Create env vars file
        run: |
          printf 'DATABASE_URL: "%s"\nOPENAI_API_KEY: "%s"\nSARVAM_API_KEY: "%s"\nGOOGLE_CLIENT_ID: "%s"\nJWT_SECRET: "%s"\n' \
            "${{ secrets.DATABASE_URL }}" \
            "${{ secrets.OPENAI_API_KEY }}" \
            "${{ secrets.SARVAM_API_KEY }}" \
            "${{ secrets.GOOGLE_CLIENT_ID }}" \
            "${{ secrets.JWT_SECRET }}" \
            > /tmp/env-vars.yaml

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vandana-ai-repo/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --env-vars-file /tmp/env-vars.yaml \
            --min-instances 0 \
            --max-instances 10 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300

      - name: Show deployed URL
        run: |
          echo "Deployed to:"
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
